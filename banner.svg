<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0d0e29" />
      <stop offset="100%" stop-color="#050510" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2" />
      <stop offset="50%" stop-color="#4a00e0" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>
    
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>

    <!-- Glassmorphic Grid Filter -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>

    <!-- Blur Filters for Glow -->
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Ambient Glows -->
  <circle cx="200" cy="100" r="180" fill="url(#glow-grad)" filter="url(#glow-filter)" />
  <circle cx="1000" cy="300" r="220" fill="url(#glow-grad)" filter="url(#glow-filter)" />

  <!-- Glowing Accent Line at the Top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent-grad)" />

  <!-- Code elements on the left (Raycast/Linear style) -->
  <g transform="translate(80, 80)" opacity="0.15">
    <!-- Code line 1 -->
    <rect x="0" y="0" width="180" height="12" rx="6" fill="#8a2be2" />
    <!-- Code line 2 -->
    <rect x="0" y="24" width="280" height="12" rx="6" fill="#3b82f6" />
    <!-- Code line 3 -->
    <rect x="20" y="48" width="120" height="12" rx="6" fill="#00d2ff" />
    <rect x="150" y="48" width="100" height="12" rx="6" fill="#d946ef" />
    <!-- Code line 4 -->
    <rect x="20" y="72" width="220" height="12" rx="6" fill="#3b82f6" />
    <!-- Code line 5 -->
    <rect x="0" y="96" width="80" height="12" rx="6" fill="#8a2be2" />
  </g>

  <!-- Floating UI Panel (Glassmorphism) -->
  <g transform="translate(750, 70)">
    <!-- Blur backdrop simulation -->
    <rect width="370" height="260" rx="16" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    
    <!-- Title bar -->
    <circle cx="25" cy="25" r="5" fill="#ef4444" opacity="0.8" />
    <circle cx="40" cy="25" r="5" fill="#f59e0b" opacity="0.8" />
    <circle cx="55" cy="25" r="5" fill="#10b981" opacity="0.8" />
    
    <!-- Code lines within the panel -->
    <g transform="translate(25, 60)" opacity="0.7">
      <!-- const builder = new AIBuilder(); -->
      <text x="0" y="15" fill="#d946ef" font-family="monospace" font-size="13">const</text>
      <text x="45" y="15" fill="#f8fafc" font-family="monospace" font-size="13">builder =</text>
      <text x="120" y="15" fill="#3b82f6" font-family="monospace" font-size="13">new</text>
      <text x="150" y="15" fill="#00d2ff" font-family="monospace" font-size="13">AIBuilder();</text>

      <!-- builder.stack = ['React', 'Next.js', 'LLMs']; -->
      <text x="0" y="40" fill="#f8fafc" font-family="monospace" font-size="13">builder.</text>
      <text x="60" y="40" fill="#3b82f6" font-family="monospace" font-size="13">stack</text>
      <text x="105" y="40" fill="#f8fafc" font-family="monospace" font-size="13">= [</text>
      <text x="125" y="40" fill="#10b981" font-family="monospace" font-size="13">'Next.js'</text>
      <text x="190" y="40" fill="#f8fafc" font-family="monospace" font-size="13">,</text>
      <text x="200" y="40" fill="#10b981" font-family="monospace" font-size="13">'LLMs'</text>
      <text x="245" y="40" fill="#f8fafc" font-family="monospace" font-size="13">];</text>

      <!-- await builder.deploy({ saas: true }); -->
      <text x="0" y="65" fill="#3b82f6" font-family="monospace" font-size="13">await</text>
      <text x="45" y="65" fill="#f8fafc" font-family="monospace" font-size="13">builder.</text>
      <text x="105" y="65" fill="#00d2ff" font-family="monospace" font-size="13">deploy</text>
      <text x="150" y="65" fill="#f8fafc" font-family="monospace" font-size="13">({</text>
      <text x="165" y="65" fill="#d946ef" font-family="monospace" font-size="13">saas:</text>
      <text x="205" y="65" fill="#3b82f6" font-family="monospace" font-size="13">true</text>
      <text x="240" y="65" fill="#f8fafc" font-family="monospace" font-size="13">});</text>

      <!-- // Status: Active -->
      <text x="0" y="100" fill="#64748b" font-family="monospace" font-style="italic" font-size="13">// Status: Actively building SaaS</text>

      <!-- Terminal output -->
      <rect x="0" y="125" width="320" height="50" rx="8" fill="rgba(0,0,0,0.4)" stroke="rgba(255,255,255,0.05)" />
      <text x="12" y="145" fill="#10b981" font-family="monospace" font-size="12">$ openify --status</text>
      <text x="12" y="163" fill="#f8fafc" font-family="monospace" font-size="12">> Openify server running at http://localhost:8000</text>
    </g>
  </g>

  <!-- Typography Content -->
  <!-- Name -->
  <text x="120" y="160" fill="#ffffff" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="54" font-weight="800" letter-spacing="-1px">
    Subh Roy
  </text>

  <!-- Title / Tagline -->
  <text x="120" y="205" fill="url(#accent-grad)" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="1.5px">
    FULL STACK DEVELOPER • AI BUILDER
  </text>

  <!-- Description -->
  <text x="120" y="250" fill="#94a3b8" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400">
    Building AI-powered SaaS and premium cross-platform experiences.
  </text>
  
  <text x="120" y="275" fill="#64748b" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="400" font-style="italic">
    Founder of DIZIVER • Specialized in MERN, Next.js, and LLM APIs.
  </text>

  <!-- Interactive/Decorative badges -->
  <g transform="translate(120, 310)">
    <rect width="110" height="26" rx="13" fill="rgba(138, 43, 226, 0.15)" stroke="rgba(138, 43, 226, 0.4)" stroke-width="1" />
    <text x="55" y="17" fill="#c084fc" font-family="'Inter', sans-serif" font-size="11" font-weight="600" text-anchor="middle">
      ✦ OPEN TO WORK
    </text>
  </g>

  <g transform="translate(245, 310)">
    <rect width="125" height="26" rx="13" fill="rgba(59, 130, 246, 0.15)" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1" />
    <text x="62" y="17" fill="#60a5fa" font-family="'Inter', sans-serif" font-size="11" font-weight="600" text-anchor="middle">
      ✦ ASSAM, INDIA
    </text>
  </g>
</svg>
