<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    
    <!-- Indigo/Blue Gradient for "Roy" -->
    <linearGradient id="roy-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Soft Glow Filter for Background -->
    <radialGradient id="radial-glow-1" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="radial-glow-2" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#f5f3ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow for Editor Panel -->
    <filter id="panel-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#0f172a" flood-opacity="0.08" />
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.03" />
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(148, 163, 184, 0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background base -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />
  <rect width="100%" height="100%" fill="url(#radial-glow-1)" />
  <rect width="100%" height="100%" fill="url(#radial-glow-2)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- LEFT CONTENT GROUP -->
  <g transform="translate(80, 110)">
    
    <!-- Bullet + Tagline -->
    <g transform="translate(0, 0)">
      <circle cx="6" cy="-6" r="5" fill="#8b5cf6" />
      <text x="22" y="-2" fill="#475569" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5px">
        FULL-STACK DEVELOPER • AI BUILDER
      </text>
    </g>

    <!-- Name: Subh Roy -->
    <text x="0" y="85" fill="#09090b" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="76" font-weight="900" letter-spacing="-2px">
      Subh <tspan fill="url(#roy-gradient)">Roy</tspan>
    </text>

    <!-- Subtitle: Building digital products with code, design &amp; AI. -->
    <text x="0" y="150" fill="#1e293b" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5px">
      Building digital products
    </text>
    <text x="0" y="185" fill="#1e293b" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5px">
      with <tspan fill="url(#roy-gradient)">code, design &amp; AI.</tspan>
    </text>

    <!-- Description Paragraph -->
    <text x="0" y="235" fill="#64748b" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400" width="380">
      I build modern, scalable and high-performance
    </text>
    <text x="0" y="260" fill="#64748b" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400" width="380">
      web applications with a focus on clean UI/UX
    </text>
    <text x="0" y="285" fill="#64748b" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400" width="380">
      and developer experience.
    </text>

    <!-- Buttons -->
    <g transform="translate(0, 335)">
      <!-- View Projects Button (Dark) -->
      <rect width="160" height="48" rx="12" fill="#09090b" />
      <text x="80" y="29" fill="#ffffff" font-family="'Inter', sans-serif" font-size="15" font-weight="600" text-anchor="middle">View Projects  ↗</text>

      <!-- Contact Me Button (White Outline) -->
      <rect x="180" width="140" height="48" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
      <text x="250" y="29" fill="#0f172a" font-family="'Inter', sans-serif" font-size="15" font-weight="600" text-anchor="middle">Contact Me  ✉</text>
    </g>
  </g>

  <!-- RIGHT EDITOR PANEL -->
  <g transform="translate(630, 100)" filter="url(#panel-shadow)">
    <!-- Main editor body -->
    <rect width="490" height="370" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- Titlebar buttons -->
    <circle cx="30" cy="30" r="6" fill="#ef4444" />
    <circle cx="48" cy="30" r="6" fill="#eab308" />
    <circle cx="66" cy="30" r="6" fill="#22c55e" />
    
    <!-- Filename tab -->
    <text x="110" y="34" fill="#64748b" font-family="'Inter', sans-serif" font-size="13" font-weight="500">hero.tsx</text>

    <!-- Editor content (Syntax highlighting matching their site) -->
    <g transform="translate(30, 85)" font-family="Consolas, 'Fira Code', Monaco, monospace" font-size="13" xml:space="preserve">
      <!-- Line 1 -->
      <text x="0" y="0" fill="#94a3b8" text-anchor="end" width="20">1</text>
      <text x="30" y="0"><tspan fill="#6366f1">import</tspan> React <tspan fill="#6366f1">from</tspan> <tspan fill="#8b5cf6">'react'</tspan></text>

      <!-- Line 2 -->
      <text x="0" y="24" fill="#94a3b8" text-anchor="end" width="20">2</text>
      <text x="30" y="24"><tspan fill="#6366f1">import</tspan> { <tspan fill="#0f172a">Hero</tspan> } <tspan fill="#6366f1">from</tspan> <tspan fill="#8b5cf6">'@/components'</tspan></text>

      <!-- Line 3 -->
      <text x="0" y="48" fill="#94a3b8" text-anchor="end" width="20">3</text>

      <!-- Line 4 -->
      <text x="0" y="72" fill="#94a3b8" text-anchor="end" width="20">4</text>
      <text x="30" y="72"><tspan fill="#6366f1">export default function</tspan> <tspan fill="#4f46e5">Hero</tspan>() {</text>

      <!-- Line 5 -->
      <text x="0" y="96" fill="#94a3b8" text-anchor="end" width="20">5</text>
      <text x="30" y="96">  <tspan fill="#6366f1">return</tspan> (</text>

      <!-- Line 6 -->
      <text x="0" y="120" fill="#94a3b8" text-anchor="end" width="20">6</text>
      <text x="30" y="120">    &lt;<tspan fill="#4f46e5">section</tspan> className=<tspan fill="#8b5cf6">"hero"</tspan>&gt;</text>

      <!-- Line 7 -->
      <text x="0" y="144" fill="#94a3b8" text-anchor="end" width="20">7</text>
      <text x="30" y="144">      &lt;<tspan fill="#4f46e5">h1</tspan>&gt;Building digital products&lt;/<tspan fill="#4f46e5">h1</tspan>&gt;</text>

      <!-- Line 8 -->
      <text x="0" y="168" fill="#94a3b8" text-anchor="end" width="20">8</text>
      <text x="30" y="168">      &lt;<tspan fill="#4f46e5">p</tspan>&gt;with code, design &amp; AI.&lt;/<tspan fill="#4f46e5">p</tspan>&gt;</text>

      <!-- Line 9 -->
      <text x="0" y="192" fill="#94a3b8" text-anchor="end" width="20">9</text>
      <text x="30" y="192">    &lt;/<tspan fill="#4f46e5">section</tspan>&gt;</text>

      <!-- Line 10 -->
      <text x="0" y="216" fill="#94a3b8" text-anchor="end" width="20">10</text>
      <text x="30" y="216">  )</text>

      <!-- Line 11 -->
      <text x="0" y="240" fill="#94a3b8" text-anchor="end" width="20">11</text>
      <text x="30" y="240">}</text>
    </g>

    <!-- Editor footer -->
    <line x1="20" y1="330" x2="470" y2="330" stroke="#e2e8f0" stroke-width="1" />
    <circle cx="35" cy="350" r="4" fill="#22c55e" />
    <text x="47" y="354" fill="#64748b" font-family="'Inter', sans-serif" font-size="11" font-weight="500">Server running on http://localhost:3000</text>
  </g>

  <!-- BOTTOM TECH STACK ROW -->
  <g transform="translate(80, 520)">
    <text x="0" y="20" fill="#94a3b8" font-family="'Outfit', 'Inter', sans-serif" font-size="12" font-weight="700" letter-spacing="1px">TECH STACK</text>
    
    <g transform="translate(100, 0)" font-family="'Outfit', 'Inter', sans-serif" font-size="14" font-weight="600" fill="#475569">
      <!-- Next.js -->
      <g transform="translate(0, 0)">
        <!-- Circle Logo -->
        <circle cx="15" cy="15" r="12" fill="#0f172a" />
        <text x="15" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-size="11" font-weight="900" text-anchor="middle">N</text>
        <text x="35" y="19">Next.js</text>
      </g>

      <!-- React -->
      <g transform="translate(110, 0)">
        <path d="M15,5 C7,15 7,15 15,25 C23,15 23,15 15,5 Z" fill="none" stroke="#0ea5e9" stroke-width="1.5" transform="rotate(30 15 15)" />
        <path d="M15,5 C7,15 7,15 15,25 C23,15 23,15 15,5 Z" fill="none" stroke="#0ea5e9" stroke-width="1.5" transform="rotate(90 15 15)" />
        <path d="M15,5 C7,15 7,15 15,25 C23,15 23,15 15,5 Z" fill="none" stroke="#0ea5e9" stroke-width="1.5" transform="rotate(150 15 15)" />
        <circle cx="15" cy="15" r="2.5" fill="#0ea5e9" />
        <text x="35" y="19">React</text>
      </g>

      <!-- TypeScript -->
      <g transform="translate(210, 0)">
        <rect x="3" y="3" width="24" height="24" rx="4" fill="#3178c6" />
        <text x="21" y="23" fill="#ffffff" font-family="'Inter', sans-serif" font-size="10" font-weight="800" text-anchor="end">TS</text>
        <text x="37" y="19">TypeScript</text>
      </g>

      <!-- Node.js -->
      <g transform="translate(320, 0)">
        <!-- Hexagon -->
        <polygon points="15,4 25,10 25,20 15,26 5,20 5,10" fill="#339933" opacity="0.9" />
        <text x="35" y="19">Node.js</text>
      </g>

      <!-- Tailwind CSS -->
      <g transform="translate(420, 0)">
        <path d="M8,15 C8,10 12,8 15,8 C19,8 21,11 22,12 C18,12 17,14 15,15 C12,16 11,18 10,22 C11,17 14,16 16,16 C19,16 21,18 22,22 C18,22 17,20 15,19 C12,18 8,20 8,15 Z" fill="#38bdf8" />
        <text x="35" y="19">Tailwind CSS</text>
      </g>

      <!-- Firebase -->
      <g transform="translate(540, 0)">
        <path d="M7,24 L15,5 L18,11 L7,24 Z" fill="#ffca28" />
        <path d="M23,20 L15,4 L11,12 L23,20 Z" fill="#ffa000" />
        <path d="M6,24 L24,24 L15,10 L6,24 Z" fill="#f57c00" />
        <text x="35" y="19">Firebase</text>
      </g>
    </g>
  </g>
</svg>
